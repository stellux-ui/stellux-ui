name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion! Please describe the feature you'd like.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New Component
        - Existing Component Enhancement
        - Theme / Styling
        - Accessibility
        - Performance
        - Documentation
        - Developer Experience
        - Other
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Related Component
      description: If this relates to a specific component, which one?
      placeholder: e.g. Select, Table, DatePicker

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem does this feature solve? Why do you need it?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like it to work. Include API design if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or screenshots.
